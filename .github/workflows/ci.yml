name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: |
          xcodebuild build \
            -project PasteBoard.xcodeproj \
            -scheme PasteBoard \
            -configuration Debug \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || xcodebuild build \
              -project PasteBoard.xcodeproj \
              -scheme PasteBoard \
              -configuration Debug \
              -destination "platform=macOS" \
              CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          xcodebuild test \
            -project PasteBoard.xcodeproj \
            -scheme PasteBoardTests \
            -configuration Debug \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || xcodebuild test \
              -project PasteBoard.xcodeproj \
              -scheme PasteBoardTests \
              -configuration Debug \
              -destination "platform=macOS" \
              CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult
          retention-days: 7
